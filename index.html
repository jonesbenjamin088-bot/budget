<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>2026 Budget</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#5b6cff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">

<style>
:root{
  --bg:#f4f5f7; --surface:#ffffff; --surface-2:#fbfbfd;
  --text:#1a1d23; --text-soft:#6b7280; --text-faint:#9ca3af;
  --border:#e6e8eb; --accent:#5b6cff; --accent-soft:#eef0ff;
  --green:#16a34a; --green-soft:#e9f8ef;
  --red:#e0473e; --red-soft:#fdecea;
  --amber:#d97706; --amber-soft:#fdf3e3;
  --input-blue:#0b50d0;
  --radius:14px; --radius-sm:10px;
  --shadow:0 1px 2px rgba(20,20,40,.04), 0 8px 24px rgba(20,20,40,.04);
  --sidebar-w:216px;
}
[data-theme="dark"]{
  --bg:#13151b; --surface:#1b1e26; --surface-2:#21242d;
  --text:#f1f2f4; --text-soft:#a1a6b2; --text-faint:#6b7080;
  --border:#2b2f3a; --accent:#7c89ff; --accent-soft:#262a45;
  --green:#34d178; --green-soft:#15301f;
  --red:#ff6b62; --red-soft:#3a1e1d;
  --amber:#f0a93b; --amber-soft:#3a2e15;
  --input-blue:#6ea8ff;
  --shadow:0 1px 2px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.35);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{margin:0;font-weight:600;letter-spacing:-.01em}
p{margin:0}
button{font-family:inherit}
.app{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:18px 12px;position:fixed;top:0;left:0;bottom:0;z-index:50;overflow-y:auto;transition:transform .25s ease}
.brand{display:flex;align-items:center;gap:10px;padding:6px 10px 20px}
.brand-mark{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#9aa4ff);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px;flex-shrink:0}
.brand-name{font-size:15px;font-weight:700}
.brand-sub{font-size:11px;color:var(--text-faint)}
.nav{display:flex;flex-direction:column;gap:2px;flex:1}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:var(--radius-sm);color:var(--text-soft);font-size:14px;font-weight:500;cursor:pointer;border:none;background:none;text-align:left;width:100%}
.nav-item:hover{background:var(--surface-2);color:var(--text)}
.nav-item.active{background:var(--accent-soft);color:var(--accent);font-weight:600}
.nav-item svg{width:18px;height:18px;flex-shrink:0}
.sidebar-foot{padding:10px 12px;font-size:11px;color:var(--text-faint)}
.main{flex:1;margin-left:var(--sidebar-w);padding:26px 30px 60px;min-width:0}
.topbar{display:none}
.page-head{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:20px;flex-wrap:wrap}
.page-title{font-size:22px}
.page-sub{font-size:13px;color:var(--text-soft);margin-top:3px}
.head-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:18px;min-width:0}
.card h3{font-size:14px;color:var(--text-soft);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.grid{display:grid;gap:18px;margin-bottom:18px}
.grid-2{grid-template-columns:1fr 1fr}
.grid-3{grid-template-columns:repeat(3,1fr)}
@media(max-width:1100px){.grid-3{grid-template-columns:1fr 1fr}}
@media(max-width:760px){.grid-2,.grid-3{grid-template-columns:1fr}}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-faint);font-weight:600;text-align:left;padding:7px 8px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:7px 8px;border-bottom:1px solid var(--border);white-space:nowrap}
tr:last-child td{border-bottom:none}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
tr.section-row td{font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-soft);background:var(--surface-2)}
tr.total-row td{font-weight:700;border-top:2px solid var(--text);border-bottom:2px solid var(--text)}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.pos{color:var(--green)} .neg{color:var(--red)}
.kv{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:14px;gap:10px}
.kv .lbl{color:var(--text-soft)}
.kv .val{font-weight:600;font-variant-numeric:tabular-nums}
.kv.big .val{font-size:17px}
.kv.rule{border-top:2px solid var(--text);margin-top:4px;padding-top:9px}
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13.5px;font-weight:500;cursor:pointer}
.btn:hover{background:var(--surface-2)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{filter:brightness(1.07)}
.btn.danger{color:var(--red)}
.btn.sm{padding:5px 10px;font-size:12.5px}
.btn:disabled{opacity:.55;cursor:default}
.icon-btn{border:none;background:none;cursor:pointer;color:var(--text-faint);padding:4px;border-radius:6px;line-height:0}
.icon-btn:hover{color:var(--text);background:var(--surface-2)}
.icon-btn svg{width:15px;height:15px}
input,select,textarea{font-family:inherit;font-size:14px;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);width:100%}
input:focus,select:focus,textarea:focus{outline:2px solid var(--accent);outline-offset:-1px}
input.inline-num{width:110px;text-align:right;padding:5px 8px;font-size:13.5px;color:var(--input-blue);font-weight:600;font-variant-numeric:tabular-nums}
input.grid-num{width:84px;text-align:right;padding:4px 6px;font-size:13px;color:var(--input-blue);font-weight:600;border-color:transparent;background:transparent}
input.grid-num:hover{border-color:var(--border);background:var(--surface)}
input.grid-num:focus{border-color:var(--accent);background:var(--surface)}
.field{margin-bottom:13px}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--text-soft);margin-bottom:5px}
.month-tabs{display:flex;gap:5px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.month-tab{padding:7px 13px;border-radius:999px;border:1px solid var(--border);background:var(--surface);color:var(--text-soft);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.month-tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11.5px;font-weight:600}
.pill.green{background:var(--green-soft);color:var(--green)}
.pill.red{background:var(--red-soft);color:var(--red)}
.pill.amber{background:var(--amber-soft);color:var(--amber)}
.pill.gray{background:var(--surface-2);color:var(--text-soft)}
.bar{height:6px;border-radius:999px;background:var(--surface-2);overflow:hidden;min-width:60px}
.bar i{display:block;height:100%;border-radius:999px;background:var(--accent)}
.bar i.over{background:var(--red)}
.modal-backdrop{position:fixed;inset:0;background:rgba(10,12,20,.45);z-index:100;display:flex;align-items:center;justify-content:center;padding:18px}
.modal{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);width:100%;max-width:440px;max-height:88vh;overflow-y:auto;padding:22px}
.modal.wide{max-width:680px}
.modal h2{font-size:17px;margin-bottom:16px}
.modal-actions{display:flex;justify-content:flex-end;gap:9px;margin-top:18px}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:10px 18px;border-radius:999px;font-size:13.5px;font-weight:500;z-index:200;opacity:0;transition:opacity .2s;pointer-events:none;max-width:90vw}
.toast.show{opacity:1}
.banner{display:flex;align-items:center;gap:10px;background:var(--amber-soft);color:var(--amber);border:1px solid var(--amber);border-radius:var(--radius-sm);padding:10px 14px;font-size:13.5px;margin-bottom:16px;flex-wrap:wrap}
.chart-box{position:relative;height:260px}
.muted{color:var(--text-faint);font-size:12.5px}
.empty{padding:22px 0;text-align:center;color:var(--text-faint);font-size:13.5px}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.sub-list .kv{border-bottom:1px solid var(--border)}
.sub-list .kv:last-of-type{border-bottom:none}
.drop{border:2px dashed var(--border);border-radius:var(--radius-sm);padding:22px;text-align:center;color:var(--text-soft);font-size:13.5px;cursor:pointer}
.drop.over{border-color:var(--accent);background:var(--accent-soft)}
@media(max-width:900px){
  .sidebar{transform:translateX(-105%)}
  .sidebar.open{transform:translateX(0);box-shadow:0 0 0 100vmax rgba(10,12,20,.35)}
  .main{margin-left:0;padding:16px 14px 70px}
  .topbar{display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:40;background:var(--bg);padding:12px 2px;margin:-4px 0 10px}
  .topbar .brand-mark{width:30px;height:30px;font-size:14px}
  .topbar h2{font-size:17px;flex:1}
  input.grid-num{width:74px}
}
.auth-wrap{position:fixed;inset:0;background:var(--bg);z-index:90;display:flex;align-items:center;justify-content:center;padding:18px}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);width:100%;max-width:370px;padding:24px}
@media print{.sidebar,.topbar,.head-actions{display:none}.main{margin:0}}

/* ===== iphone-fit: mobile layout + zoom lock (added) ===== */
html{-webkit-text-size-adjust:100%}
body{touch-action:manipulation}
img,canvas{max-width:100%}
@media(max-width:760px){
  table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
  input,select,textarea,input.inline-num,input.grid-num{font-size:16px}
}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-mark">B</div>
      <div><div class="brand-name">2026 Budget</div><div class="brand-sub" id="brandSub">Local data</div></div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="sidebar-foot" id="saveStatus"></div>
  </aside>
  <main class="main">
    <div class="topbar">
      <button class="icon-btn" id="menuBtn" aria-label="Menu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:22px;height:22px"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
      <div class="brand-mark">B</div><h2 id="topTitle">Dashboard</h2>
    </div>
    <div id="banner"></div>
    <div id="view"></div>
  </main>
</div>
<div id="authHost"></div>
<div id="modalHost"></div>
<div class="toast" id="toast"></div>
<script>
"use strict";
/* ============ Constants & state ============ */
const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const GROUPS=[["income","Income"],["fixed","Fixed Expenses"],["variable","Variable Expenses"]];
const LS_KEY="budget2026.data";
let appData=null, currentView="dashboard", dashMonth=(new Date()).getMonth(), curMonth=(new Date()).getMonth();
let sb=null, session=null, saveTimer=null, syncState="local", rtChannel=null;
let charts=[];

function uid(){return Math.random().toString(36).slice(2,10)+Date.now().toString(36).slice(-4);}
function defaultData(){
  const cat=(name,group)=>({id:uid(),name,group});
  const categories=[
    cat("Income - Job","income"),cat("Other Income","income"),
    cat("Rent","fixed"),cat("Utilities","fixed"),cat("Car Payment","fixed"),cat("Auto Insurance","fixed"),cat("Phone","fixed"),cat("Vasa","fixed"),cat("Subscriptions","fixed"),
    cat("Investments","variable"),cat("Tithing","variable"),cat("Tuition/School","variable"),cat("Groceries","variable"),cat("Restaurant","variable"),cat("Gas","variable"),
    cat("Car Maintenance","variable"),cat("Gifts","variable"),cat("Clothes","variable"),cat("Haircuts/Personal","variable"),cat("Date Night","variable"),cat("Medical","variable"),
    cat("Travel","variable"),cat("Other","variable")
  ];
  const budget={}; categories.forEach(c=>{budget[c.id]=Array(12).fill(0);});
  return {
    version:1, year:2026, savedAt:0,
    categories, budget,
    accounts:["Amex","Checking","Visa"],
    transactions:[],
    assets:{checking:0,savings:0,cardBalance:0,other:0,cece529:0},
    debts:[], subscriptions:[], paychecks:[
      {id:uid(),label:"Ben",rate:0,hours:0},
      {id:uid(),label:"Cece",rate:0,hours:0}
    ],
    holdings:[],
    settings:{theme:"light"}
  };
}
/* ============ Cloud config (filled in during setup) ============ */
const SUPABASE_URL="https://bmnqcozysifqloumwycj.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJtbnFjb3p5c2lmcWxvdW13eWNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODY4MDMsImV4cCI6MjA5Njk2MjgwM30.El8qoIGkwvX-SKJh6rdjpW6gCYRRKIkrGIXK3PS2RgE";
function cloudConfigured(){return SUPABASE_URL.indexOf("%%")===-1&&SUPABASE_URL.indexOf("http")===0;}
/* ============ Storage: local cache + cloud sync ============ */
function safeGet(k){try{return localStorage.getItem(k);}catch(e){return null;}}
function safeSet(k,v){try{localStorage.setItem(k,v);}catch(e){}}
function cacheKey(){return session?LS_KEY+"."+session.user.id:LS_KEY;}
function saveData(){
  appData.savedAt=Date.now();
  safeSet(cacheKey(),JSON.stringify(appData));
  if(session){syncState="saving";clearTimeout(saveTimer);saveTimer=setTimeout(pushCloud,800);}
  updateSaveStatus();
}
async function pushCloud(){
  if(!session)return;
  try{
    const r=await sb.from("budgets").upsert({user_id:session.user.id,data:appData,saved_at:appData.savedAt});
    syncState=r.error?"error":"synced";
  }catch(e){syncState="error";}
  if(syncState==="error"){clearTimeout(saveTimer);saveTimer=setTimeout(pushCloud,10000);}
  updateSaveStatus();
}
async function pullCloud(){
  try{
    const r=await sb.from("budgets").select("data,saved_at").eq("user_id",session.user.id).maybeSingle();
    if(r.error)return undefined;
    return r.data;
  }catch(e){return undefined;}
}
async function startSync(){
  const row=await pullCloud();
  if(row===undefined){syncState="error";updateSaveStatus();navigate();return;}
  const localRaw=safeGet(cacheKey())||safeGet(LS_KEY);
  const local=localRaw?migrate(JSON.parse(localRaw)):null;
  if(row&&(!local||(row.saved_at||0)>=(local.savedAt||0))){
    appData=migrate(row.data);
  }else if(local){
    appData=local;
    if(!row||(local.savedAt||0)>(row.saved_at||0))pushCloud();
  }else{
    appData=defaultData();pushCloud();
  }
  safeSet(cacheKey(),JSON.stringify(appData));
  syncState=syncState==="error"?"error":"synced";
  applyTheme();updateSaveStatus();navigate();
  if(rtChannel)try{sb.removeChannel(rtChannel);}catch(e){}
  rtChannel=sb.channel("budget-sync")
    .on("postgres_changes",{event:"*",schema:"public",table:"budgets",filter:"user_id=eq."+session.user.id},payload=>{
      const r=payload.new;
      if(r&&(r.saved_at||0)>(appData.savedAt||0)){
        appData=migrate(r.data);
        safeSet(cacheKey(),JSON.stringify(appData));
        applyTheme();updateSaveStatus();
        if(!document.getElementById("modalHost").innerHTML)navigate();
      }
    }).subscribe();
}
function migrate(d){
  const base=defaultData();
  const out=Object.assign({},base,d);
  out.assets=Object.assign({},base.assets,d.assets||{});
  out.settings=Object.assign({},base.settings,d.settings||{});
  out.categories=(d.categories&&d.categories.length)?d.categories:base.categories;
  out.budget=d.budget||{};
  out.categories.forEach(c=>{ if(!Array.isArray(out.budget[c.id])) out.budget[c.id]=Array(12).fill(0); });
  ["transactions","debts","subscriptions","paychecks","holdings","accounts"].forEach(k=>{ if(!Array.isArray(out[k])) out[k]=base[k]; });
  return out;
}
/* ============ Auth ============ */
function renderAuth(msg){
  document.getElementById("authHost").innerHTML=`<div class="auth-wrap"><div class="auth-card">
    <div class="brand" style="padding:0 0 16px"><div class="brand-mark">B</div><div><div class="brand-name">2026 Budget</div><div class="brand-sub">Sign in to sync your data</div></div></div>
    ${msg?`<div class="banner" style="margin-bottom:12px">${msg}</div>`:""}
    <div class="field"><label>Email</label><input id="authEmail" type="email" autocomplete="username"></div>
    <div class="field"><label>Password</label><input id="authPass" type="password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doSignIn()"></div>
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn primary" style="flex:1;justify-content:center" onclick="doSignIn()">Sign in</button>
      <button class="btn" style="flex:1;justify-content:center" onclick="doSignUp()">Create account</button>
    </div>
    <p class="muted" style="margin-top:12px">First time here: enter an email and a password (8+ characters), tap “Create account”, then click the confirmation link sent to your email and sign in.</p>
  </div></div>`;
}
function hideAuth(){document.getElementById("authHost").innerHTML="";}
async function doSignIn(){
  const email=document.getElementById("authEmail").value.trim(),pass=document.getElementById("authPass").value;
  if(!email||!pass)return;
  const r=await sb.auth.signInWithPassword({email,password:pass});
  if(r.error)renderAuth(escapeHTML(r.error.message));
}
async function doSignUp(){
  const email=document.getElementById("authEmail").value.trim(),pass=document.getElementById("authPass").value;
  if(!email||!pass)return;
  const r=await sb.auth.signUp({email,password:pass});
  if(r.error)return renderAuth(escapeHTML(r.error.message));
  renderAuth("Account created — check your email for a confirmation link, then sign in.");
}
async function doSignOut(){try{await sb.auth.signOut();}catch(e){} location.reload();}
function updateSaveStatus(){
  const el=document.getElementById("saveStatus"),sub=document.getElementById("brandSub");
  if(!cloudConfigured()){el.textContent="Saved in this browser (sync not configured)";sub.textContent="Local only";return;}
  if(!session){el.textContent="Not signed in";sub.textContent="Cloud sync";return;}
  const map={saving:"Saving…",synced:"Synced",error:"Sync error — retrying",local:"Loading…"};
  el.textContent=(map[syncState]||"Synced")+" · "+session.user.email;
  sub.textContent="Cloud sync";
}
/* ============ Helpers ============ */
function escapeHTML(s){return String(s==null?"":s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));}
const USD=new Intl.NumberFormat("en-US",{style:"currency",currency:"USD"});
function fmt(n){
  if(n==null||isNaN(n))return "–";
  const v=Math.round(n*100)/100;
  return v<0 ? "("+USD.format(-v)+")" : USD.format(v);
}
function fmtCls(n){return n<0?"neg":"";}
function fmtPct(n){return (n==null||!isFinite(n))?"–":(Math.round(n*1000)/10)+"%";}
function num(v){const n=parseFloat(String(v).replace(/[$,()\s]/g,m=>m==="("?"-":""));return isNaN(n)?0:n;}
function catById(id){return appData.categories.find(c=>c.id===id);}
function catName(id){const c=catById(id);return c?c.name:"(deleted)";}
function catsIn(group){return appData.categories.filter(c=>c.group===group);}
function expenseCats(){return appData.categories.filter(c=>c.group!=="income");}
function weekOf(dateStr){
  if(!dateStr)return "";
  const d=parseInt(dateStr.slice(8,10),10);
  return d<=7?"Week 1":d<=14?"Week 2":d<=21?"Week 3":"Week 4";
}
function txMonth(t){return t.month;}
function txsFor(month){return appData.transactions.filter(t=>t.month===month);}
function actual(catId,month){return txsFor(month).filter(t=>t.catId===catId).reduce((s,t)=>s+t.amount,0);}
function actualWeek(catId,month,week){return txsFor(month).filter(t=>t.catId===catId&&weekOf(t.date)===week).reduce((s,t)=>s+t.amount,0);}
function budgetOf(catId,month){const a=appData.budget[catId];return a?(a[month]||0):0;}
function totalBudgetExpenses(month){return expenseCats().reduce((s,c)=>s+budgetOf(c.id,month),0);}
function totalActualExpenses(month){return expenseCats().reduce((s,c)=>s+actual(c.id,month),0);}
function totalBudgetIncome(month){return catsIn("income").reduce((s,c)=>s+budgetOf(c.id,month),0);}
function totalActualIncome(month){return catsIn("income").reduce((s,c)=>s+actual(c.id,month),0);}
function pendingCharges(month){return txsFor(month).filter(t=>String(t.notes||"").trim().toLowerCase()==="pending").reduce((s,t)=>s+t.amount,0);}
function holdingsValue(){return appData.holdings.reduce((s,h)=>s+(h.symbol.toUpperCase()==="CASH"?h.qty:(h.qty*(h.price||0))),0);}
function totalCash(month){const a=appData.assets;return a.checking+a.savings-a.cardBalance-pendingCharges(month);}
function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove("show"),2600);
}
function destroyCharts(){charts.forEach(c=>{try{c.destroy()}catch(e){}});charts=[];}
function cssVar(n){return getComputedStyle(document.documentElement).getPropertyValue(n).trim();}

function navigate(){
  renderNav();

  const titles={dashboard:"Dashboard",annual:"Annual Summary",months:"Monthly",categories:"Categories",settings:"Settings"};
  document.getElementById("topTitle").textContent=titles[currentView]||"";
  const host=document.getElementById("view");
  if(currentView==="dashboard")renderDashboard(host);
  else if(currentView==="annual")renderAnnual(host);

  else if(currentView==="categories")renderCategories(host);

function setAsset(k,v){appData.assets[k]=num(v);saveData();navigate();}

function renderHoldingsTable(){
  const hs=appData.holdings;
  if(!hs.length)return `<div class="empty">No holdings — add stock tickers or a CASH row</div>`;
  const groups=[["investment","Stock Holdings - Investments"],["roth","Roth IRA - Retirement"]];
  let rows="";
  groups.forEach(([g,label])=>{
    const list=hs.filter(h=>(h.group||"investment")===g);
    if(!list.length)return;
    rows+=`<tr class="section-row"><td colspan="6">${label}</td></tr>`;
    list.forEach(h=>{
      const isCash=h.symbol.toUpperCase()==="CASH";
      const val=isCash?h.qty:h.qty*(h.price||0);
      const chg=(!isCash&&h.price&&h.prevClose)?(h.price-h.prevClose)/h.prevClose:null;
      rows+=`<tr><td><b>${escapeHTML(h.symbol.toUpperCase())}</b></td>
        <td class="num">${isCash?"–":fmt(h.price)}</td>
        <td class="num">${chg==null?"–":`<span class="${chg>=0?'pos':'neg'}">${fmtPct(chg)}</span>`}</td>
        <td class="num">${isCash?fmt(h.qty):h.qty}</td>
        <td class="num">${fmt(val)}</td>
        <td style="text-align:right"><button class="icon-btn" onclick="openHoldingModal('${h.id}')">${ICONS.edit}</button><button class="icon-btn" onclick="delItem('holdings','${h.id}')">${ICONS.trash}</button></td></tr>`;
    });
  });
  return `<div class="tbl-wrap"><table>
    <tr><th>Symbol</th><th class="num">Price</th><th class="num">% Change</th><th class="num">Qty</th><th class="num">Value</th><th></th></tr>
    ${rows}
    <tr class="total-row"><td>Total</td><td></td><td></td><td></td><td class="num">${fmt(holdingsValue())}</td><td></td></tr>
  </table></div>`;
}
function renderBudgetVsActual(m){
  const tBE=totalBudgetExpenses(m), tAE=totalActualExpenses(m);
  const row=(c)=>{
    const b=budgetOf(c.id,m), act=actual(c.id,m), v=b-act;
    return `<tr><td>${escapeHTML(c.name)}</td>
      <td class="num muted">${tBE?fmtPct(b/tBE):"–"}</td><td class="num">${fmt(b)}</td>
      <td class="num muted">${tAE?fmtPct(act/tAE):"–"}</td><td class="num">${fmt(act)}</td>
      <td class="num ${v<0?'neg':'pos'}">${fmt(v)}</td></tr>`;
  };
  let html=`<table>
    <tr><th>Category</th><th class="num">% Budget</th><th class="num">Budget</th><th class="num">% Actual</th><th class="num">Actual</th><th class="num">Variance</th></tr>
    <tr class="section-row"><td colspan="6">Income</td></tr>
    ${catsIn("income").map(c=>{
      const b=budgetOf(c.id,m),act=actual(c.id,m);
      return `<tr><td>${escapeHTML(c.name)}</td><td class="num"></td><td class="num">${fmt(b)}</td><td class="num"></td><td class="num">${fmt(act)}</td><td class="num ${act-b<0?'neg':'pos'}">${fmt(act-b)}</td></tr>`;
    }).join("")}
    <tr class="total-row"><td>Total Income</td><td></td><td class="num">${fmt(totalBudgetIncome(m))}</td><td></td><td class="num">${fmt(totalActualIncome(m))}</td><td class="num ${totalActualIncome(m)-totalBudgetIncome(m)<0?'neg':'pos'}">${fmt(totalActualIncome(m)-totalBudgetIncome(m))}</td></tr>
    <tr class="section-row"><td colspan="6">Fixed Expenses</td></tr>
    ${catsIn("fixed").map(row).join("")}
    <tr class="section-row"><td colspan="6">Variable Expenses</td></tr>
    ${catsIn("variable").map(row).join("")}
    <tr class="total-row"><td>Total Monthly Expenses</td><td></td><td class="num">${fmt(tBE)}</td><td></td><td class="num">${fmt(tAE)}</td><td class="num ${tBE-tAE<0?'neg':'pos'}">${fmt(tBE-tAE)}</td></tr>
    <tr class="total-row"><td>Income − Expense</td><td></td><td class="num ${fmtCls(totalBudgetIncome(m)-tBE)}">${fmt(totalBudgetIncome(m)-tBE)}</td><td></td><td class="num ${fmtCls(totalActualIncome(m)-tAE)}">${fmt(totalActualIncome(m)-tAE)}</td><td></td></tr>
  </table>`;
  return html;
}
function chartPalette(n){
  const base=["#5b6cff","#16a34a","#d97706","#e0473e","#0ea5e9","#8b5cf6","#ec4899","#14b8a6","#f59e0b","#64748b","#84cc16","#06b6d4","#a855f7","#f43f5e","#22c55e","#eab308","#3b82f6","#fb7185","#34d399","#fbbf24","#94a3b8","#c084fc","#2dd4bf"];
  return Array.from({length:n},(_,i)=>base[i%base.length]);
}
function renderDashCharts(m){
  const cats=expenseCats().map(c=>({name:c.name,act:actual(c.id,m),bud:budgetOf(c.id,m)})).filter(x=>x.act>0||x.bud>0);
  const txt=cssVar("--text-soft"), grid=cssVar("--border");
  const sc=document.getElementById("spendChart");
  if(sc){
    const withSpend=cats.filter(c=>c.act>0);
    if(withSpend.length){
      charts.push(new Chart(sc,{type:"doughnut",data:{labels:withSpend.map(c=>c.name),datasets:[{data:withSpend.map(c=>c.act),backgroundColor:chartPalette(withSpend.length),borderWidth:0}]},
        options:{maintainAspectRatio:false,plugins:{legend:{position:"right",labels:{color:txt,boxWidth:10,font:{size:11}}}}}}));
    } else sc.parentElement.innerHTML='<div class="empty">No spending logged for '+MONTHS[m]+'</div>';
  }
  const bc=document.getElementById("bvaChart");
  if(bc){
    if(cats.length){
      charts.push(new Chart(bc,{type:"bar",data:{labels:cats.map(c=>c.name),datasets:[
        {label:"Budget",data:cats.map(c=>c.bud),backgroundColor:cssVar("--accent")+"99"},
        {label:"Actual",data:cats.map(c=>c.act),backgroundColor:cssVar("--accent")}]},
        options:{maintainAspectRatio:false,scales:{x:{ticks:{color:txt,font:{size:10},maxRotation:60,minRotation:40},grid:{display:false}},y:{ticks:{color:txt},grid:{color:grid}}},plugins:{legend:{labels:{color:txt}}}}}));
    } else bc.parentElement.innerHTML='<div class="empty">Set budgets or log spending to see this chart</div>';
  }
}

  if(!title)return showToast("Enter a title");

const PRICE_CACHE={};
async function fetchQuote(symbol){
  if(PRICE_CACHE[symbol])return PRICE_CACHE[symbol];
  const sym=encodeURIComponent(symbol);
  const targets=[
    `https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d&range=1d`,
    `https://query2.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d&range=1d`
  ];
  const tryUrl=async url=>{
    const res=await fetch(url);
    if(!res.ok)return null;
    const json=await res.json();
    const meta=json&&json.chart&&json.chart.result&&json.chart.result[0]&&json.chart.result[0].meta;
    if(meta&&meta.regularMarketPrice!==undefined)
      return {price:meta.regularMarketPrice,prevClose:meta.previousClose!=null?meta.previousClose:meta.chartPreviousClose};
    return null;
  };
  for(const url of targets){ try{const q=await tryUrl(url);if(q){PRICE_CACHE[symbol]=q;return q;}}catch(e){} }
  for(const url of targets){ try{const q=await tryUrl(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`);if(q){PRICE_CACHE[symbol]=q;return q;}}catch(e){} }
  return null;
}
async function refreshAllPrices(){
  const btn=document.getElementById("refreshPricesBtn");
  if(btn){btn.disabled=true;btn.textContent="Refreshing…";}
  const symbols=[...new Set(appData.holdings.map(h=>h.symbol.toUpperCase()).filter(s=>s!=="CASH"))];
  let ok=0,fail=0;
  for(const sym of symbols){
    const q=await fetchQuote(sym);
    if(q){ok++;appData.holdings.filter(h=>h.symbol.toUpperCase()===sym).forEach(h=>{h.price=q.price;h.prevClose=q.prevClose;});}
    else fail++;
  }
  saveData();
  if(currentView==="dashboard")navigate();
  showToast(ok?`Updated ${ok} price${ok===1?"":"s"}${fail?`, ${fail} failed`:""}`:(symbols.length?"Could not fetch prices — check connection":"No tickers to refresh"));
}

  const drop=document.getElementById("csvDrop");

function parseCSV(text){
  const rows=[];let row=[],cur="",inQ=false;
  for(let i=0;i<text.length;i++){
    const ch=text[i];
    if(inQ){
      if(ch==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else inQ=false; }
      else cur+=ch;
    }else{
      if(ch==='"')inQ=true;
      else if(ch===","){row.push(cur);cur="";}
      else if(ch==="\n"||ch==="\r"){ if(ch==="\r"&&text[i+1]==="\n")i++; row.push(cur);cur=""; if(row.some(c=>c.trim()!==""))rows.push(row); row=[]; }
      else cur+=ch;
    }
  }
  if(cur!==""||row.length){row.push(cur);if(row.some(c=>c.trim()!==""))rows.push(row);}
  return rows;
}
function csvChosen(file){
  if(!file)return;
  const reader=new FileReader();
  reader.onload=()=>{
    const rows=parseCSV(String(reader.result));
    if(rows.length<2)return showToast("CSV needs a header row plus data");
    csvParsed={header:rows[0],rows:rows.slice(1)};
    const opts=h=>h.map((c,i)=>`<option value="${i}">${escapeHTML(c||("Column "+(i+1)))}</option>`).join("");
    const guess=(names)=>{const idx=csvParsed.header.findIndex(h=>names.some(n=>h.toLowerCase().includes(n)));return idx<0?0:idx;};
    const catOpts=[];GROUPS.forEach(([g])=>catsIn(g).forEach(c=>catOpts.push(`<option value="${c.id}">${escapeHTML(c.name)}</option>`)));
    document.getElementById("csvMap").innerHTML=`
      <div class="grid grid-3" style="margin:14px 0 0">
        <div class="field"><label>Date column</label><select id="m_date">${opts(csvParsed.header)}</select></div>
        <div class="field"><label>Description column</label><select id="m_name">${opts(csvParsed.header)}</select></div>
        <div class="field"><label>Amount column</label><select id="m_amt">${opts(csvParsed.header)}</select></div>
      </div>
      <div class="grid grid-2" style="margin-bottom:0">
        <div class="field"><label>Default category for imported rows</label><select id="m_cat">${catOpts.join("")}</select></div>
        <div class="field"><label>Account</label><select id="m_acct">${appData.accounts.map(a=>`<option>${escapeHTML(a)}</option>`).join("")}</select></div>
      </div>
      <p class="muted">${csvParsed.rows.length} data rows found. Rows whose date falls in another month are filed to that month automatically. You can re-categorize after import.</p>`;
    document.getElementById("m_date").value=guess(["date","posted"]);
    document.getElementById("m_name").value=guess(["desc","name","merchant","payee"]);
    document.getElementById("m_amt").value=guess(["amount","amt","debit"]);
    document.getElementById("csvImportBtn").disabled=false;
  };
  reader.readAsText(file);
}
function parseDateAny(s){
  s=String(s||"").trim();
  let m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if(m)return {y:+m[1],mo:+m[2],d:+m[3]};
  m=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
  if(m){let y=+m[3];if(y<100)y+=2000;return {y,mo:+m[1],d:+m[2]};}
  const d=new Date(s);
  if(!isNaN(d))return {y:d.getFullYear(),mo:d.getMonth()+1,d:d.getDate()};
  return null;
}
function doCSVImport(){
  if(!csvParsed)return;
  const di=+document.getElementById("m_date").value, ni=+document.getElementById("m_name").value, ai=+document.getElementById("m_amt").value;
  const catId=document.getElementById("m_cat").value, acct=document.getElementById("m_acct").value;
  let added=0,skipped=0;
  csvParsed.rows.forEach(r=>{
    const pd=parseDateAny(r[di]);
    const amt=Math.abs(num(r[ai]));
    const name=String(r[ni]||"").trim();
    if(!pd||!name||!amt){skipped++;return;}
    const date=`${pd.y}-${String(pd.mo).padStart(2,"0")}-${String(pd.d).padStart(2,"0")}`;
    appData.transactions.push({id:uid(),catId,account:acct,name,date,amount:amt,notes:"",month:pd.mo-1});
    added++;
  });
  saveData();closeModal();navigate();
  showToast(`Imported ${added} transaction${added===1?"":"s"}${skipped?`, skipped ${skipped}`:""}`);
}

  if(ti<0||ti>=siblings.length)return;

      <div class="kv"><span class="lbl">Theme</span>
        <select style="width:auto" onchange="setTheme(this.value)">
          <option value="light" ${appData.settings.theme==="light"?"selected":""}>Light</option>
          <option value="dark" ${appData.settings.theme==="dark"?"selected":""}>Dark</option>
        </select></div>
      <div class="kv"><span class="lbl">Budget year</span><input class="inline-num" value="${appData.year}" onchange="appData.year=parseInt(this.value)||2026;saveData();navigate()"></div>
    </div>
    <div class="card">
      <h3>Account &amp; Sync</h3>
      ${cloudConfigured()
        ? (session
          ? `<div class="kv"><span class="lbl">Signed in as</span><span class="val" style="font-size:13px">${escapeHTML(session.user.email)}</span></div>
             <div class="kv"><span class="lbl">Sync status</span><span class="val">${syncState==="error"?"Error — retrying":"Up to date"}</span></div>
             <p class="muted" style="margin:8px 0 12px">Every change saves to your private cloud database automatically. Sign in with the same email on any device to see the same data.</p>
             <button class="btn" onclick="doSignOut()">Sign out</button>`
          : `<p class="muted">Not signed in.</p>`)
        : `<p class="muted">Cloud sync is not configured in this copy — data stays in this browser. Use Export/Import to move data.</p>`}
    </div>
  </div>
  <div class="grid grid-2">
    <div class="card">
      <h3>Backup</h3>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn" onclick="exportJSON()">Export JSON</button>
        <button class="btn" onclick="document.getElementById('importFile').click()">Import JSON</button>
        <input type="file" id="importFile" accept=".json,application/json" style="display:none" onchange="importJSON(this.files[0])">
      </div>
      <p class="muted" style="margin-top:10px">Export downloads a full snapshot. Import replaces everything with the chosen file (and syncs it to the cloud if signed in).</p>
    </div>
    <div class="card">
      <h3>Danger Zone</h3>
      <button class="btn danger" onclick="resetAll()">Erase all data…</button>
    </div>
  </div>`;
}
function setTheme(t){appData.settings.theme=t;applyTheme();saveData();navigate();}
function applyTheme(){document.documentElement.setAttribute("data-theme",appData.settings.theme==="dark"?"dark":"light");}
function exportJSON(){
  const blob=new Blob([JSON.stringify(appData,null,1)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=`budget-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();URL.revokeObjectURL(a.href);
}
function importJSON(file){
  if(!file)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const d=JSON.parse(String(r.result));
      if(!d.categories)throw new Error("bad");
      appData=migrate(d);
      saveData();applyTheme();navigate();
      showToast("Data imported");
    }catch(e){showToast("Not a valid backup file");}
  };
  r.readAsText(file);
}
function resetAll(){
  if(!confirm("Erase ALL budget data? This cannot be undone."))return;
  if(!confirm("Are you sure? Consider exporting a backup first."))return;
  appData=defaultData();
  saveData();applyTheme();navigate();
}
/* ============ Init ============ */
function init(){
  const raw=safeGet(LS_KEY);
  appData=raw?migrate(JSON.parse(raw)):defaultData();
  applyTheme();
  document.getElementById("menuBtn").addEventListener("click",()=>document.getElementById("sidebar").classList.toggle("open"));
  document.addEventListener("click",e=>{
    const sb2=document.getElementById("sidebar");
    if(sb2.classList.contains("open")&&!sb2.contains(e.target)&&e.target.id!=="menuBtn"&&!document.getElementById("menuBtn").contains(e.target))sb2.classList.remove("open");
  });
  updateSaveStatus();
  navigate();
  if("serviceWorker" in navigator){try{navigator.serviceWorker.register("sw.js");}catch(e){}}
  if(!cloudConfigured()){
    document.getElementById("banner").innerHTML='<div class="banner">Cloud sync is not configured in this copy — data is saved in this browser only.</div>';
    return;
  }
  sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
  renderAuth();
  sb.auth.onAuthStateChange((event,sess)=>{
    const had=!!session;
    session=sess;
    if(sess){hideAuth();if(!had)startSync();}
    else{renderAuth();updateSaveStatus();}
  });
}
init();
</script>
<script>/* iphone-fit */document.addEventListener("gesturestart",function(e){e.preventDefault();},{passive:false});</script>
</body>
</html>
